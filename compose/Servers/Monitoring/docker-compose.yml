services:
  prometheus-service:
    container_name: prometheus-monitor
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - calc-db-network

    restart: unless-stopped

  grafana-service:
    container_name: grafana-monitor
    image: grafana/grafana-oss:latest

    depends_on:
      - prometheus-service
    ports:
      - "3000:3000"
    environment:
      GF_DEFAULT_INSTANCE_NAME: ${GF_INSTANCE_NAME}
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
      GF_DASHBOARDS_MIN_REFRESH_INTERVAL: 5s

    restart: unless-stopped

    volumes:
      - grafana-data:/var/lib/grafana
      - ./Grafana/provisioning/:/etc/grafana/provisioning/

    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

    networks:
      - calc-db-network

  mysql-exporter:
    container_name: mysql-monitor
    image: prom/mysqld-exporter:latest
    command:
      - --mysqld.username=${MYSQL_USERNAME}:${MYSQL_USER_PASSWORD}
      - --mysqld.address=mysql-calc:3306
    ports:
      - "9104:9104"
    restart: unless-stopped

    networks:
      - calc-db-network

  cadvisor-service:
    container_name: cadvisor-monitor
    image: gcr.io/cadvisor/cadvisor:latest

    depends_on:
      - prometheus-service
    command:
      - --port=8082
    ports:
      - "8082:8082"
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro

    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8082 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

    networks:
      - calc-db-network

volumes:
  grafana-data:
  prometheus-data:

networks:
  calc-db-network:
    external: true